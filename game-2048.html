<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自动 2048</title>
    <link rel="stylesheet" href="./src/arcade.css" />
  </head>
  <body>
    <main class="arcade-app">
      <section class="arcade-shell">
        <header class="arcade-hero">
          <p class="eyebrow">Logic Arcade</p>
          <h1>Auto 2048</h1>
          <p class="lead">自动评估四个滑动方向，尽量把大数留在角落，持续往更高的方块合成。</p>
        </header>

        <section class="arcade-layout">
          <section class="panel stage-panel">
            <div class="panel-head">
              <div>
                <p>AI 数字拼图</p>
                <h2>自动合成中</h2>
              </div>
              <div class="stat">
                <span>当前分数</span>
                <strong id="score">0</strong>
              </div>
            </div>

            <p id="status" class="status">自动 2048 已就位，马上开始连锁合成。</p>
            <div class="board-shell">
              <div id="board" class="grid-board board-4" aria-label="2048 棋盘"></div>
            </div>
          </section>

          <aside class="panel side-panel">
            <section class="stat-grid">
              <div class="stat">
                <span>最大数字</span>
                <strong id="bestTile">2</strong>
              </div>
              <div class="stat">
                <span>移动步数</span>
                <strong id="moves">0</strong>
              </div>
              <div class="stat">
                <span>自动状态</span>
                <strong id="autoStatus">AI 持续评估四个方向</strong>
              </div>
              <div class="stat">
                <span>目标</span>
                <strong>2048+</strong>
              </div>
            </section>

            <div class="actions">
              <button id="pauseButton" type="button">暂停</button>
              <button id="restartButton" type="button">重开</button>
              <button id="autoButton" class="wide" type="button">自动合成：开</button>
            </div>

            <section class="card">
              <p class="card-label">Strategy</p>
              <p id="strategy" class="strategy">策略：优先保留空格、维持单调大数角落，并避免把大数字打散。</p>
            </section>

            <section class="card">
              <p class="card-label">Manual</p>
              <p class="help">想自己玩：先关闭“自动合成”，再用键盘方向键滑动棋盘；空格暂停，点击“重开”重新开始。</p>
            </section>

            <a class="button-link" href="./index.html">返回小游戏首页</a>
          </aside>
        </section>
      </section>
    </main>

    <script type="module" src="./src/main-2048.js"></script>
  </body>
</html>
